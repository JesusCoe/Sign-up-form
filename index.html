<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="main">
        <div class="left">
            <div class="banner">
                <img src="../images/odin-lined.png" 
                alt="odin logo" class="header-img">
                <div class="header-txt">ODIN</div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="top-text">
                    <h4>
                    This is not a real online service! You know you need something <br>
                    like this in your life to help you realize your deepest dreams. <br>
                    Sign up <em>now</em> to get started
                    </h4>
                    <h4>
                    You <em>know</em> you want to.
                    </h4>
                </div>
            </div>
            <div class="middle">
                <h5 class="middle-txt">Let's do this!</h5>
                <form action="" method="post" class="form-main-div">
                    <div class="form-divs">
                        <div class="form-div">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" 
                            required 
                            minlength="2" 
                            maxlength="20">
                        </div>
                        <div class="form-div">
                            <label for="user_email">Email</label>
                            <input type="email" id="user_email" name="email" required>
                        </div>
                        <div class="form-div">
                            <label for="user_password">Password</label>
                            <input type="password" id="user_password" name="password" 
                            required 
                            minlength="8">
                        </div>
                    </div>
                    <div class="form-divs">
                        <div class="form-div">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" 
                            required 
                            minlength="2" 
                            maxlength="20">
                        </div>
                        <div class="form-div">
                            <label for="user_phone">Phone Number</label>
                            <input type="tel" 
                            id="user_phone" 
                            name="phone" 
                            pattern="^[+]?[0-9\s\-\(\)\.]{7,20}$"
                            placeholder="+1 (555) 000-0000"
                            required>
                        </div>
                        <div class="form-div">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" 
                            required 
                            minlength="8">
                        </div>
                    </div>
                </form>
                
            </div>
            <div class="bottom">
                <div class="form-button">
                    <button type="submit" class="acc-btn">Create Account</button>
                </div>
                <div class="bottom-txt">
                    <p>Already have an account? <a href="#">Log In</a> </p>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
